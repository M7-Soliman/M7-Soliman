<svg viewBox="0 0 1280 504" width="1280" height="504" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Soliman — software engineer who builds data pipelines, ML on messy data, retrieval and search, full-stack apps, and games for fun. Stack: Python, TypeScript, React, Node.js, FastAPI, Django, Postgres, Snowflake, Dagster, Docker, Kubernetes, AWS, LangChain, Qdrant. Selected research: Method Signature Similarity in Java Codebases (ASSE 2024); Open-source Tools for Wearable Data Extraction (medRxiv 2025).">
  <defs>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C1018"/><stop offset="1" stop-color="#080A10"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5B8AC9"/><stop offset="1" stop-color="#E8B45A"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.3" cy="1.3" r="1.3" fill="#27303F"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <style>
      .name{font-family:'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:800}
      .mono{font-family:ui-monospace,'SF Mono','JetBrains Mono','Menlo','Consolas','Courier New',monospace}
      .body{font-family:'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif}
      .card{animation:rise .5s ease-out both}
      .c1{animation-delay:.05s}.c2{animation-delay:.13s}.c3{animation-delay:.21s}.c4{animation-delay:.29s}.c5{animation-delay:.37s}
      .lower{animation:fade .6s ease-out both;animation-delay:.5s}
      @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
      @keyframes fade{from{opacity:0}to{opacity:1}}
      @media (prefers-reduced-motion:reduce){.card,.lower{animation:none}}
    </style>
  </defs>

  <rect width="1280" height="504" fill="url(#ink)"/>
  <rect x="772" y="0" width="508" height="262" fill="url(#dots)" opacity="0.5"/>

  <text x="64" y="92" class="mono" font-size="14" fill="#5B8AC9" letter-spacing="3">SOFTWARE  ENGINEER</text>
  <text x="60" y="180" class="name" font-size="92" fill="#EDF1F7" letter-spacing="-2">Soliman</text>
  <rect x="64" y="204" width="132" height="3" rx="1.5" fill="url(#rule)"/>
  <text x="64" y="244" class="body" font-size="20" fill="#A7B0BE">I like building cool things across whatever</text>
  <text x="64" y="272" class="body" font-size="20" fill="#A7B0BE">a problem needs<tspan fill="#7A8699">  —  and going deep where it counts.</tspan></text>

  <g class="mono" font-size="13.5">
    <text x="882" y="52" fill="#5A6675" letter-spacing="1">// stuff I build</text>
    <g class="card c1" transform="translate(880,66)" filter="url(#soft)">
      <rect width="252" height="54" rx="9" fill="#11151F" stroke="#222B39"/>
      <circle cx="20" cy="19" r="3.2" fill="#5B8AC9"/><text x="36" y="24" fill="#AEB7C4">data pipelines at scale</text>
    </g>
    <g class="card c2" transform="translate(890,96)" filter="url(#soft)">
      <rect width="252" height="54" rx="9" fill="#11151F" stroke="#222B39"/>
      <circle cx="20" cy="19" r="3.2" fill="#5B8AC9"/><text x="36" y="24" fill="#AEB7C4">ml on messy real-world data</text>
    </g>
    <g class="card c3" transform="translate(900,126)" filter="url(#soft)">
      <rect width="252" height="54" rx="9" fill="#11151F" stroke="#222B39"/>
      <circle cx="20" cy="19" r="3.2" fill="#5B8AC9"/><text x="36" y="24" fill="#AEB7C4">retrieval &amp; search</text>
    </g>
    <g class="card c4" transform="translate(910,156)" filter="url(#soft)">
      <rect width="252" height="54" rx="9" fill="#11151F" stroke="#222B39"/>
      <circle cx="20" cy="19" r="3.2" fill="#5B8AC9"/><text x="36" y="24" fill="#AEB7C4">full-stack apps, front to infra</text>
    </g>
    <g class="card c5" transform="translate(920,186)" filter="url(#soft)">
      <rect width="252" height="54" rx="9" fill="#15110A" stroke="#E8B45A" stroke-opacity="0.85"/>
      <circle cx="20" cy="19" r="3.2" fill="#E8B45A"/><text x="36" y="24" fill="#E8B45A">a game, in a weekend, for fun</text>
    </g>
  </g>

  <rect x="64" y="300" width="44" height="2" fill="#E8B45A"/>
  <line x1="112" y1="301" x2="1216" y2="301" stroke="#1B2230" stroke-width="1"/>

  <g class="lower">
    <line x1="636" y1="330" x2="636" y2="470" stroke="#1B2230" stroke-width="1"/>

    <text x="64" y="344" class="mono" font-size="13" fill="#5B8AC9" letter-spacing="3">STACK</text>
    <g class="mono" font-size="15.5">
      <text x="64"  y="384" fill="#7E8696">Core</text>
      <text x="148" y="384" fill="#C3CBD7">Python · TypeScript · React · Node.js · FastAPI · Django</text>
      <text x="64"  y="420" fill="#7E8696">Data</text>
      <text x="148" y="420" fill="#C3CBD7">Postgres · Snowflake · Dagster · Docker · Kubernetes · AWS</text>
      <text x="64"  y="456" fill="#7E8696">AI</text>
      <text x="148" y="456" fill="#C3CBD7">LangChain · Qdrant · embeddings &amp; vector search</text>
    </g>

    <text x="672" y="344" class="mono" font-size="13" fill="#5B8AC9" letter-spacing="3">SELECTED RESEARCH</text>
    <text x="672" y="384" class="body" font-size="16" font-style="italic" fill="#D7DCE4">Method Signature Similarity in Java Codebases</text>
    <text x="672" y="406" class="mono" font-size="13" fill="#7A8699">ASSE · 2024</text>
    <text x="672" y="444" class="body" font-size="16" font-style="italic" fill="#D7DCE4">Open-source Tools for Wearable Data Extraction</text>
    <text x="672" y="466" class="mono" font-size="13" fill="#7A8699">medRxiv · 2025</text>
  </g>
</svg>
